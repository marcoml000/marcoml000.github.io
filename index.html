<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Currículum de Marco</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
      background-color: #f9f9f9;
    }
    h1 {
      color: #333;
    }
    iframe {
      width: 80%;
      height: 600px;
      border: 1px solid #ccc;
      margin-top: 20px;
    }
    a {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 15px;
      background-color: #007acc;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }
    a:hover {
      background-color: #005f99;
    }
  </style>
</head>
<body>
  <h1>Currículum de Marco</h1>
  <!-- Visualización del PDF -->
  <iframe src="Marco A Martinez CV_compressed.pdf"></iframe>
  <!-- Enlace de descarga -->
  <p><a href="Marco A Martinez CV_compressed.pdf" download>Descargar CV en PDF</a></p>
</body>
</html>
